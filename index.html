<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>달렸수익 메일 인증 완료</title>
    <style>
      :root {
        --primary: #ff5e00;
        --bg: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --card: #ffffff;
        --shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR",
          "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      }

      .wrap {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 460px;
        background: var(--card);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 28px 22px;
        text-align: center;
      }

      .badge {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        margin: 0 auto 16px;
        background: rgba(255, 94, 0, 0.12);
        display: grid;
        place-items: center;
        color: var(--primary);
        font-size: 30px;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.3;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .desc {
        color: var(--muted);
        margin-top: 8px;
        font-size: 15px;
      }

      .guide {
        margin-top: 18px;
        padding: 14px;
        border-radius: 12px;
        background: #fff6f0;
        color: #7c2d12;
        font-size: 14px;
      }

      .app-name {
        display: inline-block;
        margin-top: 18px;
        font-weight: 700;
        color: var(--primary);
      }

      @media (max-width: 360px) {
        .card {
          padding: 24px 16px;
        }
        h1 {
          font-size: 21px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="badge" aria-hidden="true">✓</div>
        <h1>메일 인증이 완료되었습니다</h1>
        <p class="desc">
          이제 <strong>달렸수익</strong> 앱으로 돌아가서<br />
          로그인해 주세요.
        </p>
        <p class="guide">
          앱이 자동으로 열리지 않으면, 앱을 직접 실행한 뒤<br />
          가입한 이메일과 비밀번호로 로그인하면 됩니다.
        </p>
        <span class="app-name">달렸수익</span>
      </section>
    </main>
  </body>
</html>
